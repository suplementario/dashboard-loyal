<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loyal - Producción Healthspring</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --azul-loyal: #0d2b45;
            --dorado-loyal: #d4af37;
            --bg: #f8f9fa;
            --blanco: #ffffff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        header { 
            display: flex; align-items: center; justify-content: space-between; 
            background: var(--azul-loyal); padding: 15px 30px; border-radius: 10px; margin-bottom: 20px; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .logo-container img { height: 70px; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3)); }

        .filters { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); 
            gap: 15px; margin-bottom: 20px; background: var(--blanco); padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 5px; width: 100%; box-sizing: border-box; }

        /* Estilos para los cuadros de productos */
        .product-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
            gap: 15px; margin-bottom: 15px; 
        }
        .product-card { 
            background: var(--azul-loyal); color: white; padding: 15px; border-radius: 8px; 
            text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product-card h4 { margin: 0; font-size: 12px; text-transform: uppercase; color: var(--dorado-loyal); }
        .product-card p { margin: 5px 0 0; font-size: 20px; font-weight: bold; }

        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .kpi-card { background: var(--blanco); padding: 20px; border-radius: 10px; text-align: center; border-top: 5px solid var(--dorado-loyal); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .kpi-card h3 { margin: 0; font-size: 14px; color: #777; text-transform: uppercase; }
        .kpi-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; color: var(--azul-loyal); }

        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .chart-box { background: var(--blanco); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .chart-box h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px; color: var(--azul-loyal); }

        .table-container { background: var(--blanco); padding: 20px; border-radius: 10px; overflow-x: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px; }
        table th { background: var(--azul-loyal); color: white; padding: 12px; text-align: left; }
        table td { padding: 10px; border-bottom: 1px solid #eee; }
        table tr:hover { background: #f1f1f1; }

        .status-msg { font-size: 12px; color: #d4af37; font-weight: bold; margin-top: 5px; }
        
        @media (max-width: 768px) { .charts-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="Logo Loyal - H-04.png" alt="Loyal Logo" onerror="this.alt='LOYAL LOGO'">
        </div>
        <div style="text-align: right;">
            <h2 style="margin:0">Producción Healthspring</h2>
            <div id="status" class="status-msg">Conectando con la nube...</div>
        </div>
    </header>

    <div class="filters">
        <div>
            <label>Mes:</label>
            <select id="selMes"><option value="TODOS">Cargando...</option></select>
        </div>
        <div>
            <label>Día (Emisión):</label>
            <select id="selDia"><option value="TODOS">Cargando...</option></select>
        </div>
        <div>
            <label>Agente:</label>
            <select id="selAgente"><option value="TODOS">Cargando...</option></select>
        </div>
        <div>
            <label>Estatus:</label>
            <select id="selEstatus"><option value="TODOS">Cargando...</option></select>
        </div>
        <div>
            <label>Producto:</label>
            <select id="selProducto"><option value="TODOS">Cargando...</option></select>
        </div>
    </div>

    <div id="productGrid" class="product-container">
        </div>

    <div class="kpi-container">
        <div class="kpi-card"><h3>Total NAP</h3><p id="kpiNap">$0.00</p></div>
        <div class="kpi-card"><h3>Pólizas</h3><p id="kpiPolizas">0</p></div>
        <div class="kpi-card"><h3>Agentes</h3><p id="kpiAgentes">0</p></div>
        <div class="kpi-card"><h3>Prima Promedio</h3><p id="kpiPromedio">$0.00</p></div>
    </div>

    <div class="charts-grid">
        <div class="chart-box">
            <h3>Tendencia Diaria (NAP)</h3>
            <canvas id="chartDias"></canvas>
        </div>
        <div class="chart-box">
            <h3>NAP por Mes</h3>
            <canvas id="chartMeses"></canvas>
        </div>
    </div>

    <div class="table-container">
        <h3>Detalle de Información</h3>
        <table id="tablaData">
            <thead>
                <tr>
                    <th>Mes</th>
                    <th>Fecha</th>
                    <th>Agente</th>
                    <th>Producto</th>
                    <th>Póliza N°</th>
                    <th>NAP</th>
                    <th>Estatus</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // PEGA AQUÍ TU ENLACE DE PUBLICACIÓN DE GOOGLE SHEETS (CSV)
        const URL_SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTE35F21xvxnugbjZCUCdtL_YQarjHiY68TJiujptOEsRedXHgvbydTh3QoBG1A48IkbOyjGQmGQOs5/pub?output=csv';

        let dataGlobal = [];
        let chartD = null;
        let chartM = null;

        function initAutoLoad() {
            Papa.parse(URL_SHEET, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    dataGlobal = results.data;
                    document.getElementById('status').innerText = '● Datos Sincronizados';
                    initDashboard();
                }
            });
        }

        function initDashboard() {
            cargarSelects();
            procesarYFiltrar();
        }

        function cargarSelects() {
            const meses = [...new Set(dataGlobal.map(item => item.MES))].filter(Boolean).sort();
            const dias = [...new Set(dataGlobal.map(item => item['FECHA DE EMISION']))].filter(Boolean).sort();
            const agentes = [...new Set(dataGlobal.map(item => item.AGENTE))].filter(Boolean).sort();
            const estatus = [...new Set(dataGlobal.map(item => item.ESTATUS))].filter(Boolean).sort();
            const productos = [...new Set(dataGlobal.map(item => item.PRODUCTO))].filter(Boolean).sort();

            fillSelect('selMes', meses);
            fillSelect('selDia', dias);
            fillSelect('selAgente', agentes);
            fillSelect('selEstatus', estatus);
            fillSelect('selProducto', productos);

            [ 'selMes', 'selDia', 'selAgente', 'selEstatus', 'selProducto' ].forEach(id => {
                document.getElementById(id).addEventListener('change', procesarYFiltrar);
            });
        }

        function fillSelect(id, items) {
            const el = document.getElementById(id);
            el.innerHTML = `<option value="TODOS">Todos</option>`;
            items.forEach(i => el.innerHTML += `<option value="${i}">${i}</option>`);
        }

        function procesarYFiltrar() {
            const fMes = document.getElementById('selMes').value;
            const fDia = document.getElementById('selDia').value;
            const fAgente = document.getElementById('selAgente').value;
            const fEstatus = document.getElementById('selEstatus').value;
            const fProd = document.getElementById('selProducto').value;

            const filtered = dataGlobal.filter(d => {
                return (fMes === 'TODOS' || d.MES === fMes) &&
                       (fDia === 'TODOS' || d['FECHA DE EMISION'] === fDia) &&
                       (fAgente === 'TODOS' || d.AGENTE === fAgente) &&
                       (fEstatus === 'TODOS' || d.ESTATUS === fEstatus) &&
                       (fProd === 'TODOS' || d.PRODUCTO === fProd);
            });

            actualizarCuadrosProductos(filtered);
            actualizarKPIs(filtered);
            dibujarGraficos(filtered);
            dibujarTabla(filtered);
        }

        function actualizarCuadrosProductos(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            
            const counts = {};
            data.forEach(d => { if(d.PRODUCTO) counts[d.PRODUCTO] = (counts[d.PRODUCTO] || 0) + 1; });

            Object.keys(counts).sort().forEach(prod => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `<h4>${prod}</h4><p>${counts[prod]}</p>`;
                grid.appendChild(card);
            });
        }

        function actualizarKPIs(data) {
            const totalNap = data.reduce((acc, curr) => acc + (parseFloat(curr.NAP) || 0), 0);
            const totalPol = data.length;
            const agentesUnicos = [...new Set(data.map(d => d.AGENTE))].length;
            const promedio = totalPol > 0 ? totalNap / totalPol : 0;

            document.getElementById('kpiNap').innerText = `$${totalNap.toLocaleString()}`;
            document.getElementById('kpiPolizas').innerText = totalPol;
            document.getElementById('kpiAgentes').innerText = agentesUnicos;
            document.getElementById('kpiPromedio').innerText = `$${promedio.toLocaleString()}`;
        }

        function dibujarGraficos(data) {
            const diasMap = {};
            data.forEach(d => {
                const fecha = d['FECHA DE EMISION'] || 'Sin Fecha';
                diasMap[fecha] = (diasMap[fecha] || 0) + (parseFloat(d.NAP) || 0);
            });
            const labelsDias = Object.keys(diasMap).sort();
            const valuesDias = labelsDias.map(l => diasMap[l]);

            const mesesMap = {};
            data.forEach(d => {
                if(d.MES) mesesMap[d.MES] = (mesesMap[d.MES] || 0) + (parseFloat(d.NAP) || 0);
            });
            const labelsMeses = Object.keys(mesesMap);
            const valuesMeses = labelsMeses.map(l => mesesMap[l]);

            if(chartD) chartD.destroy();
            if(chartM) chartM.destroy();

            chartD = new Chart(document.getElementById('chartDias'), {
                type: 'line',
                data: {
                    labels: labelsDias,
                    datasets: [{ label: 'NAP', data: valuesDias, borderColor: '#d4af37', tension: 0.3, fill: true, backgroundColor: 'rgba(212, 175, 55, 0.1)' }]
                }
            });

            chartM = new Chart(document.getElementById('chartMeses'), {
                type: 'bar',
                data: {
                    labels: labelsMeses,
                    datasets: [{ label: 'NAP Total', data: valuesMeses, backgroundColor: '#0d2b45' }]
                }
            });
        }

        function dibujarTabla(data) {
            const tbody = document.querySelector('#tablaData tbody');
            tbody.innerHTML = '';
            data.slice(-50).reverse().forEach(d => { 
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${d.MES || ''}</td>
                    <td>${d['FECHA DE EMISION'] || ''}</td>
                    <td>${d.AGENTE || ''}</td>
                    <td>${d.PRODUCTO || ''}</td>
                    <td>${d['N° POLIZA'] || ''}</td>
                    <td>$${parseFloat(d.NAP || 0).toFixed(2)}</td>
                    <td style="color: ${d.ESTATUS === 'ACTIVE' ? 'green' : 'red'}"><strong>${d.ESTATUS || ''}</strong></td>
                `;
                tbody.appendChild(tr);
            });
        }

        initAutoLoad();
    </script>
</body>
</html>
